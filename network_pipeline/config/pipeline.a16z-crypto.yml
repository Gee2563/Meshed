version: 1
pipeline:
  source_registry:
    output_path: data/sources/a16z_crypto_sources.csv
    source_root: public/crypto_ecosystems/a16z-crypto
    overwrite: false
  fetch_raw:
    sources_path: data/sources/a16z_crypto_sources.csv
    output_dir: data/raw/a16z-crypto
    metadata_path: data/raw/a16z_crypto_fetch_metadata.csv
    overwrite: false
  scrape_portfolio:
    input_root: data/raw/a16z-crypto
    output_path: data/staging/a16z-crypto/portfolio_snapshot.json
  normalize_schema:
    input_path: data/staging/a16z-crypto/portfolio_snapshot.json
    output_path: data/staging/a16z-crypto/companies_normalized.json
  similarity_scoring:
    input_path: data/staging/a16z-crypto/companies_normalized.json
    nodes_output_path: data/network/a16z-crypto/company_nodes.json
    edges_output_path: data/network/a16z-crypto/company_edges.json
    top_k: 4
    min_score: 0.24
    include_shared_investor_bonus: false
  dashboard_publish:
    normalized_path: data/staging/a16z-crypto/companies_normalized.json
    stage_path: data/staging/a16z-crypto/portfolio_snapshot.json
    company_nodes_path: data/network/a16z-crypto/company_nodes.json
    company_edges_path: data/network/a16z-crypto/company_edges.json
    output_root: public/a16z-crypto
